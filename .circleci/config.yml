version: 2.1

jobs:
  build_test:
    docker:
      - image: cimg/ruby:2.7.1-node
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - bundler-v2-{{ checksum "Gemfile.lock" }}
            - bundler-v2-
      - restore_cache:
          keys:
            - node-modules-v2-{{ checksum "package-lock.json" }}
            - node-modules-v2-
      - restore_cache:
          keys:
            - npm-v2-{{ checksum "package-lock.json" }}
            - npm-v2-
      - run:
          name: Install Bundler
          command: gem install bundler -v 2.4.22
      - run:
          name: Install Ruby dependencies
          command: |
            bundle config set path "vendor/bundle"
            bundle install --jobs 4 --retry 3
      - run:
          name: Install Node dependencies
          command: |
            if [ -d node_modules ]; then
              echo "node_modules cache hit; skipping npm ci"
            else
              npm ci --no-audit --prefer-offline
            fi
      - save_cache:
          key: bundler-v2-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle
      - save_cache:
          key: node-modules-v2-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - save_cache:
          key: npm-v2-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Generate site output
          command: bundle exec rake generate
      - run:
          name: Run site checks
          command: bundle exec rake test
      - persist_to_workspace:
          root: .
          paths:
            - _site

  publish:
    docker:
      - image: cimg/ruby:2.7.1-node
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - bundler-v2-{{ checksum "Gemfile.lock" }}
            - bundler-v2-
      - run:
          name: Install Bundler
          command: gem install bundler -v 2.4.22
      - run:
          name: Install Ruby dependencies
          command: |
            bundle config set path "vendor/bundle"
            bundle install --jobs 4 --retry 3
      - run:
          name: Publish generated site
          command: bundle exec rake publish_site

workflows:
  version: 2
  test-and-build:
    jobs:
      - build_test:
          filters:
            branches:
              ignore:
                - staging-build
                - master
      - publish:
          requires:
            - build_test
          filters:
            branches:
              only:
                - staging
